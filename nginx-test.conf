worker_processes 2;
error_log /home/claude/test/logs/error.log info;
pid /home/claude/test/nginx.pid;
events { worker_connections 128; }

http {
    access_log off;

    upstream backend {
        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
        healthcheck interval=1000 timeout=500 fall=2 rise=2 uri=/health;
    }

    server {
        listen 127.0.0.1:8888;

        location / {
            proxy_pass http://backend;
        }

        location /hc-status {
            healthcheck_status;
        }
    }
}
