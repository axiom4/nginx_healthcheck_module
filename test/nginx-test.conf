# Run from the test/ directory with the matching prefix, so the relative
# paths below (cert.pem, log/pid files) resolve correctly, e.g.:
#   cd test && /path/to/objs/nginx -p "$PWD" -c nginx-test.conf

load_module ../dist/ngx_http_upstream_healthcheck_module.so;

worker_processes 2;
error_log error.log warn;
pid nginx.pid;
events { worker_connections 128; }

http {
    access_log off;

    upstream backend {
        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
        healthcheck interval=1000 timeout=500 fall=2 rise=2 uri=/health match=ok ssl ssl_verify=on ssl_trusted_certificate=cert.pem;
    }

    healthcheck_match ok {
        status 200-299;
        body ~ "\"status\"\s*:\s*\"ok\"";
    }

    server {
        listen 127.0.0.1:8888;

        location / {
            proxy_pass https://backend;
            proxy_ssl_verify off;
        }

        location /hc-status {
            healthcheck_status;
        }
    }
}
