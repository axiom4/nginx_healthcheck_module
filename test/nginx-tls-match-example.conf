# Run from the test/ directory with the matching prefix, e.g.:
#   cd test && /path/to/objs/nginx -p "$PWD" -c nginx-tls-match-example.conf

load_module ../dist/ngx_http_upstream_healthcheck_module.so;

worker_processes 1;
error_log error-combo.log info;
pid nginx-combo.pid;
events { worker_connections 128; }

http {
    access_log off;

    healthcheck_match ok {
        status 200-299;
        body ~ "\"status\"\s*:\s*\"ok\"";
    }

    upstream backend_combo {
        server 127.0.0.1:9301;
        server 127.0.0.1:9302;
        healthcheck interval=1000 timeout=800 fall=2 rise=2 uri=/
                    match=ok ssl ssl_verify=off;
    }

    server {
        listen 127.0.0.1:8902;
        location / { proxy_pass https://backend_combo; }
        location /hc-status { healthcheck_status; }
    }
}
